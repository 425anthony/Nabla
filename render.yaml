# Render Blueprint for Nabla — https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in Render go to
#   New + → Blueprint → select this repo. Render reads render.yaml and creates
#   both services below.
#
# ── Environment variables to set in the Render dashboard ───────────────────
# Both vars are marked `sync: false`, so Render prompts you for them (they are
# NOT stored in git). There is a one-time chicken-and-egg with the URLs:
#
#   1. First apply the blueprint. Render assigns URLs like
#        backend : https://nabla-backend.onrender.com
#        frontend: https://nabla-frontend.onrender.com
#   2. Set the vars to point at each other:
#        nabla-backend  → ALLOWED_ORIGINS = https://nabla-frontend.onrender.com
#        nabla-frontend → VITE_API_URL    = https://nabla-backend.onrender.com
#   3. VITE_API_URL is baked in at BUILD time, so after setting it you must
#      trigger a redeploy of nabla-frontend ("Manual Deploy → Clear build cache
#      & deploy") for the value to take effect. ALLOWED_ORIGINS is read at
#      runtime, so the backend just needs a restart/redeploy.
#
# Note: on the free plan, services sleep after inactivity (first request after
# idle takes ~50s), and disk is ephemeral — the MNIST cache re-downloads
# (~11MB) after a restart, which the app handles automatically on first /train.

services:
  # ── Backend: FastAPI (Docker) ────────────────────────────────────────────
  - type: web
    name: nabla-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # set to the frontend URL, e.g. https://nabla-frontend.onrender.com

  # ── Frontend: Vite build served as a static site ─────────────────────────
  - type: web
    name: nabla-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false   # set to the backend URL, e.g. https://nabla-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
